version: "3.8"

services:
  bot:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://essencial:essencial@postgres:5432/essencial_bot

  postgres:
    image: postgres:16-alpine
    container_name: essencial-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: essencial
      POSTGRES_PASSWORD: essencial
      POSTGRES_DB: essencial_bot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U essencial -d essencial_bot"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  postgres-data:
    driver: local
