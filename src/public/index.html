<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essencial Energia — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="header-icon">⚡</span>
        <div>
          <h1 class="header-title">Essencial Energia</h1>
          <p class="header-subtitle">Dashboard de Leads</p>
        </div>
      </div>
      <div class="header-meta">
        <span id="db-status" class="badge badge--loading">Conectando...</span>
        <span id="last-update" class="last-update"></span>
        <button id="btn-refresh" class="btn-refresh" title="Atualizar dados">↻</button>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- ── Cards de métricas ─────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-title">Visão Geral</h2>
      <div id="stats-cards" class="cards-grid">
        <div class="card card--skeleton"></div>
        <div class="card card--skeleton"></div>
        <div class="card card--skeleton"></div>
        <div class="card card--skeleton"></div>
        <div class="card card--skeleton"></div>
        <div class="card card--skeleton"></div>
      </div>
    </section>

    <!-- ── Gráficos ──────────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-title">Análise</h2>
      <div class="charts-grid">

        <div class="chart-card">
          <div class="chart-card__header">
            <h3 class="chart-card__title">Leads por Dia</h3>
            <select id="select-dias" class="select-sm">
              <option value="7">7 dias</option>
              <option value="30" selected>30 dias</option>
              <option value="90">90 dias</option>
            </select>
          </div>
          <div class="chart-card__body">
            <canvas id="chart-leads-dia"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <div class="chart-card__header">
            <h3 class="chart-card__title">Por Segmento</h3>
          </div>
          <div class="chart-card__body chart-card__body--center">
            <canvas id="chart-segmentos"></canvas>
          </div>
        </div>

        <div class="chart-card chart-card--wide">
          <div class="chart-card__header">
            <h3 class="chart-card__title">Funil de Conversão</h3>
          </div>
          <div class="chart-card__body" style="height:180px;position:relative;">
            <canvas id="chart-funil"></canvas>
          </div>
        </div>

      </div>
    </section>

    <!-- ── Tabela de leads ────────────────────────────────────────── -->
    <section class="section">
      <div class="table-header">
        <h2 class="section-title" style="margin-bottom:0">Leads Recentes</h2>
        <div class="table-filters">
          <select id="filter-segment" class="select-sm">
            <option value="">Todos os segmentos</option>
            <option value="venda">Venda</option>
            <option value="locacao">Locação</option>
            <option value="manutencao">Manutenção</option>
          </select>
          <select id="filter-icp" class="select-sm">
            <option value="">ICP + Fora do ICP</option>
            <option value="true">Somente ICP</option>
            <option value="false">Somente Fora do ICP</option>
          </select>
          <input type="date" id="filter-date-from" class="input-sm" title="Data inicial">
          <input type="date" id="filter-date-to"   class="input-sm" title="Data final">
          <button id="btn-filter" class="btn-filter">Filtrar</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="table" id="leads-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Empresa</th>
              <th>Segmento</th>
              <th>ICP</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="leads-tbody">
            <tr><td colspan="8" class="table-loading">Carregando...</td></tr>
          </tbody>
        </table>
      </div>

      <div id="leads-pagination" class="pagination"></div>
    </section>

  </main>

  <!-- ── Modal de detalhes do lead ─────────────────────────────────── -->
  <div id="lead-detail-modal" class="modal" aria-hidden="true">
    <div class="modal__backdrop" id="modal-backdrop"></div>
    <div class="modal__box" role="dialog" aria-labelledby="modal-title">
      <div class="modal__header">
        <h3 class="modal__title" id="modal-title">Detalhes do Lead</h3>
        <button class="modal__close" id="modal-close" aria-label="Fechar">✕</button>
      </div>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="js/api.js" defer></script>
  <script src="js/charts.js" defer></script>
  <script src="js/app.js" defer></script>

</body>
</html>
